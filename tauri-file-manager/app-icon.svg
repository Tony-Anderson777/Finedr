<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#0055CC"/>
    </linearGradient>
    <linearGradient id="folder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d0e8ff" stop-opacity="1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Blue rounded background -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="0" y="0" width="1024" height="512" rx="230" fill="white" opacity="0.07"/>

  <!-- Folder body -->
  <g filter="url(#shadow)">
    <!-- Folder tab -->
    <path d="M150 430 Q150 360 220 360 L400 360 Q440 360 464 395 L508 455 L150 455 Z" fill="white" opacity="0.95"/>
    <!-- Folder main body -->
    <rect x="150" y="435" width="724" height="400" rx="52" fill="white" opacity="0.95"/>
  </g>

  <!-- Magnifying glass (blue, on white folder) -->
  <g filter="url(#shadow)">
    <circle cx="470" cy="640" r="110" stroke="#007AFF" stroke-width="64" fill="none"/>
    <line x1="553" y1="723" x2="650" y2="820" stroke="#007AFF" stroke-width="68" stroke-linecap="round"/>
  </g>

  <!-- Pen (blue, top right) -->
  <g transform="translate(700, 500) rotate(32)" opacity="0.95">
    <rect x="-28" y="-85" width="56" height="130" rx="18" fill="#007AFF"/>
    <polygon points="-28,45 28,45 0,98" fill="#007AFF"/>
    <rect x="-28" y="-112" width="56" height="34" rx="10" fill="#5AC8FA"/>
    <rect x="-10" y="-78" width="20" height="8" rx="4" fill="white" opacity="0.5"/>
  </g>
</svg>
